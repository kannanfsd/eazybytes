server:
  port: 8071
spring:
  application:
    name: configserver
  profiles:
    #active: native
    active: git
  cloud:
    config:
      server:
        git:
          uri: https://github.com/kannanfsd/eazybytes-config.git
          default-label: main
          timeout: 5
          clone-on-start: true
          force-pull: true
        #native:
          #search-locations: classpath:/config
          #search-locations: "file:///C://document//eazybytes//config"
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true

  key: KQ65IGscXfYa8+xMkAg2n4xfe2LkSk7Z5ylJLoEHTbU=

